<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stok Karlılığı Hesaplama</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#1f2937;
padding:25px;
border-radius:12px;
width:450px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>Stok Karlılığı Hesaplama</h1>

<input type="number" id="kar" placeholder="Toplam Kar (₺)">

<input type="number" id="stok" placeholder="Ortalama Stok Değeri (₺)">

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result"></div>

</div>

<script>

function hesapla(){

let kar=parseFloat(document.getElementById("kar").value);
let stok=parseFloat(document.getElementById("stok").value);

if(!kar || !stok){
alert("Tüm alanları doldurun");
return;
}

let oran=(kar/stok)*100;

document.getElementById("sonuc").innerHTML=
"Stok Karlılığı: %" +
oran.toFixed(2);

}

</script>

</body>
</html>
