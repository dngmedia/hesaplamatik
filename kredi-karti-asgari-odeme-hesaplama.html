<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kredi Kartı Asgari Ödeme Hesaplama</title>

<style>
body{
font-family:Arial,sans-serif;
background:#0b1437;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#16204d;
padding:30px;
border-radius:20px;
width:90%;
max-width:500px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#8b5cf6;
color:white;
font-size:18px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<div class="container">
<h1>Kredi Kartı Asgari Ödeme</h1>

<label>Borç Tutarı (₺)</label>
<input type="number" id="borc">

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result"></div>

</div>

<script>
function hesapla(){

let borc=parseFloat(document.getElementById("borc").value);

if(!borc){
alert("Tutar giriniz");
return;
}

let asgari=borc*0.20;

document.getElementById("sonuc").innerHTML=
"Asgari Ödeme: "+asgari.toLocaleString("tr-TR")+" ₺";
}
</script>

</body>
</html>
