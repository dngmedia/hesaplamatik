<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Araç Kredisi Hesaplama</title>

<style>
body{
font-family:Arial,sans-serif;
background:#0b1437;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#16204d;
padding:30px;
border-radius:20px;
width:90%;
max-width:500px;
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#8b5cf6;
color:white;
font-size:18px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:22px;
text-align:center;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h1>Araç Kredisi Hesaplama</h1>

<label>Kredi Tutarı (₺)</label>
<input type="number" id="kredi">

<label>Faiz Oranı (%)</label>
<input type="number" id="faiz">

<label>Vade (Ay)</label>
<input type="number" id="vade">

<button onclick="hesapla()">Hesapla</button>

<div class="result" id="sonuc"></div>
</div>

<script>
function hesapla(){

let kredi=parseFloat(document.getElementById("kredi").value);
let faiz=parseFloat(document.getElementById("faiz").value)/100;
let vade=parseFloat(document.getElementById("vade").value);

if(!kredi || !faiz || !vade){
alert("Tüm alanları doldurun");
return;
}

let aylik=(kredi*(1+faiz*vade))/vade;

document.getElementById("sonuc").innerHTML=
"Aylık Taksit: "+
aylik.toLocaleString("tr-TR",{maximumFractionDigits:2})+
" ₺";
}
</script>

</body>
</html>
