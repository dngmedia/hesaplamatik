<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tapu Harcı Hesaplama</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#1f2937;
padding:25px;
border-radius:12px;
width:450px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>Tapu Harcı Hesaplama</h1>

<input type="number" id="bedel" placeholder="Satış Bedeli (₺)">

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result"></div>

</div>

<script>

function hesapla(){

let bedel=parseFloat(document.getElementById("bedel").value);

if(!bedel){
alert("Satış bedeli giriniz");
return;
}

let toplamHarc=bedel*0.04;
let kisiBasi=toplamHarc/2;

document.getElementById("sonuc").innerHTML=
`
Toplam Tapu Harcı:<br>
${toplamHarc.toLocaleString('tr-TR')} ₺
<br><br>
Alıcı Payı:<br>
${kisiBasi.toLocaleString('tr-TR')} ₺
<br><br>
Satıcı Payı:<br>
${kisiBasi.toLocaleString('tr-TR')} ₺
`;

}

</script>

</body>
</html>
