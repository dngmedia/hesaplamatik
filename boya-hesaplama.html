<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boya Hesaplama</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#1f2937;
padding:25px;
border-radius:12px;
width:420px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>Boya Hesaplama</h1>

<input type="number" id="uzunluk" placeholder="Oda Uzunluğu (m)">

<input type="number" id="genislik" placeholder="Oda Genişliği (m)">

<input type="number" id="yukseklik" placeholder="Duvar Yüksekliği (m)">

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result"></div>

</div>

<script>

function hesapla(){

let uzunluk=parseFloat(document.getElementById("uzunluk").value);
let genislik=parseFloat(document.getElementById("genislik").value);
let yukseklik=parseFloat(document.getElementById("yukseklik").value);

if(!uzunluk || !genislik || !yukseklik){
alert("Tüm alanları doldurun");
return;
}

let alan=((uzunluk+genislik)*2)*yukseklik;

let litre=alan/10;

document.getElementById("sonuc").innerHTML=
"Gerekli Boya: " +
litre.toFixed(1) +
" Litre";

}

</script>

</body>
</html>
