<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prim Hesaplama</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#1f2937;
padding:25px;
border-radius:12px;
width:420px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>Prim Hesaplama</h1>

<input type="number" id="satis" placeholder="Satış Tutarı (₺)">

<input type="number" id="oran" placeholder="Prim Oranı (%)">

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result"></div>

</div>

<script>

function hesapla(){

let satis=parseFloat(document.getElementById("satis").value);
let oran=parseFloat(document.getElementById("oran").value);

if(!satis || !oran){
alert("Tüm alanları doldurun");
return;
}

let prim=satis*oran/100;

document.getElementById("sonuc").innerHTML=
"Kazanılan Prim: " +
prim.toLocaleString("tr-TR",{maximumFractionDigits:2}) +
" ₺";

}

</script>

</body>
</html>
