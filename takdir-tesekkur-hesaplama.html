<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takdir Teşekkür Hesaplama</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111827;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:#1f2937;
    padding:25px;
    border-radius:12px;
    width:400px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.result{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
<h1>Takdir Teşekkür Hesaplama</h1>

<input type="number" id="ortalama" step="0.01" placeholder="Yıl Sonu Ortalaması">

<button onclick="hesapla()">Sonucu Göster</button>

<div id="sonuc" class="result"></div>
</div>

<script>
function hesapla(){

let ort = parseFloat(document.getElementById("ortalama").value);

let sonuc = "";

if(ort >= 85){
    sonuc = "🏆 Takdir Belgesi Almaya Hak Kazandınız";
}
else if(ort >= 70){
    sonuc = "🎉 Teşekkür Belgesi Almaya Hak Kazandınız";
}
else{
    sonuc = "❌ Belge Alamıyorsunuz";
}

document.getElementById("sonuc").innerHTML = sonuc;

}
</script>

</body>
</html>
