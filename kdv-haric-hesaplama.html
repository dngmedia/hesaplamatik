<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KDV Hariç Hesaplama</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#1f2937;
padding:25px;
border-radius:12px;
width:420px;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>KDV Hariç Hesaplama</h1>

<input type="number" id="fiyat" placeholder="KDV Dahil Fiyat (₺)">

<select id="oran">
<option value="1">%1 KDV</option>
<option value="10">%10 KDV</option>
<option value="20">%20 KDV</option>
</select>

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result"></div>

</div>

<script>

function hesapla(){

let fiyat=parseFloat(document.getElementById("fiyat").value);
let oran=parseFloat(document.getElementById("oran").value);

if(!fiyat){
alert("Fiyat giriniz");
return;
}

let haric=fiyat/(1+oran/100);
let kdv=fiyat-haric;

document.getElementById("sonuc").innerHTML=
"KDV Hariç Tutar: "+
haric.toLocaleString("tr-TR",{maximumFractionDigits:2})+
" ₺<br><br>KDV Tutarı: "+
kdv.toLocaleString("tr-TR",{maximumFractionDigits:2})+
" ₺";

}

</script>

</body>
</html>
