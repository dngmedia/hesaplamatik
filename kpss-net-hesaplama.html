<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPSS Net Hesaplama</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#1f2937;
padding:25px;
border-radius:12px;
width:500px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>KPSS Net Hesaplama</h1>

<input type="number" id="dogru" placeholder="Doğru Sayısı">

<input type="number" id="yanlis" placeholder="Yanlış Sayısı">

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result"></div>

</div>

<script>

function hesapla(){

let dogru=parseFloat(document.getElementById("dogru").value);
let yanlis=parseFloat(document.getElementById("yanlis").value);

if(isNaN(dogru) || isNaN(yanlis)){
alert("Tüm alanları doldurun");
return;
}

let net = dogru - (yanlis / 4);

document.getElementById("sonuc").innerHTML =
"KPSS Netiniz: " + net.toFixed(2);

}

</script>

</body>
</html>
