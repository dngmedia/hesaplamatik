<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Komisyon Hesaplama - Hesapmatik</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#07142c;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}
.card{
background:#102348;
padding:30px;
border-radius:20px;
width:90%;
max-width:500px;
}
input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-bottom:15px;
box-sizing:border-box;
}
button{
width:100%;
padding:15px;
background:#8b5cf6;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}
.result{
margin-top:20px;
padding:15px;
background:#1b3568;
border-radius:10px;
}
</style>
</head>
<body>

<div class="card">

<h1>Komisyon Hesaplama</h1>

<input type="number" id="tutar" placeholder="Satış Tutarı (TL)">
<input type="number" id="oran" placeholder="Komisyon Oranı (%)">

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result" style="display:none;"></div>

</div>

<script>

function hesapla(){

let tutar=parseFloat(document.getElementById("tutar").value);
let oran=parseFloat(document.getElementById("oran").value);

let komisyon=tutar*oran/100;
let kalan=tutar-komisyon;

document.getElementById("sonuc").style.display="block";

document.getElementById("sonuc").innerHTML=
"Komisyon: <strong>"+komisyon.toFixed(2)+" TL</strong><br><br>Eline Geçen: <strong>"+kalan.toFixed(2)+" TL</strong>";

}

</script>

</body>
</html>
