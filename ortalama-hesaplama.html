<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ortalama Hesaplama - Hesapmatik</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#07142c;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:#102348;
padding:30px;
border-radius:20px;
width:90%;
max-width:550px;
}

textarea{
width:100%;
height:120px;
padding:15px;
border:none;
border-radius:10px;
margin-bottom:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
background:#8b5cf6;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.result{
margin-top:20px;
padding:15px;
background:#1b3568;
border-radius:10px;
}

.back{
display:block;
text-align:center;
margin-top:20px;
color:#9ec5ff;
text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

<h1>Ortalama Hesaplama</h1>

<textarea id="sayilar" placeholder="Örnek: 80,90,70,100"></textarea>

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result" style="display:none;"></div>

<a href="index.html" class="back">← Ana Sayfaya Dön</a>

</div>

<script>

function hesapla(){

let giris = document.getElementById("sayilar").value;

let sayilar = giris.split(",").map(Number);

let toplam = 0;

for(let i=0;i<sayilar.length;i++){
toplam += sayilar[i];
}

let ortalama = toplam / sayilar.length;

document.getElementById("sonuc").style.display="block";

document.getElementById("sonuc").innerHTML =
"Ortalama: <strong>" + ortalama.toFixed(2) + "</strong>";

}

</script>

</body>
</html>
