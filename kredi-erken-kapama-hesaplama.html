<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kredi Erken Kapama Hesaplama</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#1f2937;
padding:25px;
border-radius:12px;
width:420px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>Kredi Erken Kapama</h1>

<input type="number" id="kalanBorc" placeholder="Kalan Borç (₺)">

<input type="number" id="indirim" placeholder="İndirim Oranı (%)" value="5">

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result"></div>

</div>

<script>

function hesapla(){

let borc=parseFloat(document.getElementById("kalanBorc").value);
let indirim=parseFloat(document.getElementById("indirim").value);

if(!borc){
alert("Borç tutarını giriniz");
return;
}

let kapama=borc-(borc*indirim/100);

document.getElementById("sonuc").innerHTML=
"Erken Kapama Tutarı: "+
kapama.toLocaleString("tr-TR")+
" ₺";

}

</script>

</body>
</html>
