<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kredi Hesaplama - Hesapmatik</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#07142c;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:#102348;
padding:30px;
border-radius:20px;
width:90%;
max-width:550px;
box-shadow:0 0 25px rgba(0,0,0,.3);
}

h1{text-align:center;}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-bottom:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
background:#3b82f6;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.result{
margin-top:20px;
background:#1b3568;
padding:15px;
border-radius:10px;
line-height:2;
}

.back{
display:block;
text-align:center;
margin-top:20px;
color:#9ec5ff;
text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

<h1>Kredi Hesaplama</h1>

<input type="number" id="kredi" placeholder="Kredi Tutarı (TL)">

<input type="number" id="faiz" placeholder="Aylık Faiz (%)">

<input type="number" id="vade" placeholder="Vade (Ay)">

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result" style="display:none;"></div>

<a href="index.html" class="back">← Ana Sayfaya Dön</a>

</div>

<script>

function hesapla(){

let kredi=parseFloat(document.getElementById("kredi").value);
let faiz=parseFloat(document.getElementById("faiz").value)/100;
let vade=parseFloat(document.getElementById("vade").value);

if(!kredi || !faiz || !vade){
alert("Tüm alanları doldurun");
return;
}

let taksit =
(kredi*faiz*Math.pow(1+faiz,vade))/
(Math.pow(1+faiz,vade)-1);

let toplam=taksit*vade;

document.getElementById("sonuc").style.display="block";

document.getElementById("sonuc").innerHTML=
`
Aylık Taksit: ${taksit.toFixed(2)} TL<br>
Toplam Geri Ödeme: ${toplam.toFixed(2)} TL
`;

}

</script>

</body>
</html>
