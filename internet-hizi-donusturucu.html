<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İnternet Hızı Dönüştürücü</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#1f2937;
padding:25px;
border-radius:12px;
width:450px;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>İnternet Hızı Dönüştürücü</h1>

<input type="number" id="deger" placeholder="Değer">

<select id="tip">
<option value="mbps">Mbps → MB/s</option>
<option value="mbs">MB/s → Mbps</option>
</select>

<button onclick="hesapla()">Dönüştür</button>

<div id="sonuc" class="result"></div>

</div>

<script>

function hesapla(){

let deger=parseFloat(document.getElementById("deger").value);
let tip=document.getElementById("tip").value;

if(!deger){
alert("Değer giriniz");
return;
}

let sonuc="";

if(tip==="mbps"){
sonuc=(deger/8).toFixed(2)+" MB/s";
}else{
sonuc=(deger*8).toFixed(2)+" Mbps";
}

document.getElementById("sonuc").innerHTML=sonuc;

}

</script>

</body>
</html>
