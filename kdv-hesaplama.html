<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="KDV hesaplama aracı ile KDV dahil ve hariç tutarları kolayca hesaplayın. Güncel KDV oranlarıyla ücretsiz online hesaplama.">
  
<meta name="robots" content="index, follow">  
<title>KDV Hesaplama Aracı (KDV Dahil & Hariç) | Hesaplarsin</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#07142c;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:#102348;
padding:30px;
border-radius:20px;
width:90%;
max-width:500px;
box-shadow:0 0 25px rgba(0,0,0,.3);
}

h1{
text-align:center;
margin-bottom:20px;
}

input,select{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#3b82f6;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.result{
margin-top:20px;
background:#1b3568;
padding:15px;
border-radius:10px;
line-height:2;
}

.back{
display:block;
text-align:center;
margin-top:20px;
color:#9ec5ff;
text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

<h1>KDV Hesaplama</h1>

<input type="number" id="tutar" placeholder="Tutar Gir">

<select id="oran">
<option value="1">%1</option>
<option value="10">%10</option>
<option value="20" selected>%20</option>
</select>

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result" style="display:none;"></div>

<a href="index.html" class="back">← Ana Sayfaya Dön</a>

</div>

<script>
function hesapla(){

let tutar=parseFloat(document.getElementById("tutar").value);
let oran=parseFloat(document.getElementById("oran").value);

if(!tutar){
alert("Tutar giriniz");
return;
}

let kdv=tutar*oran/100;
let toplam=tutar+kdv;

document.getElementById("sonuc").style.display="block";
document.getElementById("sonuc").innerHTML=
`
KDV Hariç: ${tutar.toFixed(2)} TL<br>
KDV Oranı: %${oran}<br>
KDV Tutarı: ${kdv.toFixed(2)} TL<br>
KDV Dahil: ${toplam.toFixed(2)} TL
`;
}
</script>

</body>
</html>
