<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaş Hesaplama - Hesapmatik</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#07142c;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:#102348;
padding:30px;
border-radius:20px;
width:90%;
max-width:500px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-bottom:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
background:#8b5cf6;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:20px;
padding:15px;
background:#1b3568;
border-radius:10px;
}

.back{
display:block;
text-align:center;
margin-top:20px;
color:#9ec5ff;
text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

<h1>Yaş Hesaplama</h1>

<input type="date" id="dogum">

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result" style="display:none;"></div>

<a href="index.html" class="back">← Ana Sayfaya Dön</a>

</div>

<script>

function hesapla(){

let tarih = new Date(document.getElementById("dogum").value);
let bugun = new Date();

let yas = bugun.getFullYear() - tarih.getFullYear();

if(
bugun.getMonth() < tarih.getMonth() ||
(bugun.getMonth() === tarih.getMonth() &&
bugun.getDate() < tarih.getDate())
){
yas--;
}

document.getElementById("sonuc").style.display="block";
document.getElementById("sonuc").innerHTML =
"Yaşınız: <strong>" + yas + "</strong>";
}

</script>

</body>
</html>
