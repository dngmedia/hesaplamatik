<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İhbar Tazminatı Hesaplama</title>

<style>
body{
font-family:Arial,sans-serif;
background:#0b1437;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#16204d;
padding:30px;
border-radius:20px;
width:90%;
max-width:500px;
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#8b5cf6;
color:white;
font-size:18px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:22px;
text-align:center;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h1>İhbar Tazminatı Hesaplama</h1>

<label>Brüt Maaş (₺)</label>
<input type="number" id="maas">

<label>İhbar Süresi (Hafta)</label>
<input type="number" id="hafta">

<button onclick="hesapla()">Hesapla</button>

<div class="result" id="sonuc"></div>
</div>

<script>
function hesapla(){

let maas=parseFloat(document.getElementById("maas").value);
let hafta=parseFloat(document.getElementById("hafta").value);

if(!maas || !hafta){
alert("Tüm alanları doldurun");
return;
}

let sonuc=(maas/4)*hafta;

document.getElementById("sonuc").innerHTML=
"Tahmini İhbar Tazminatı: "+
sonuc.toLocaleString("tr-TR")+
" ₺";
}
</script>

</body>
</html>
