<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dosya Boyutu Dönüştürücü</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#1f2937;
padding:25px;
border-radius:12px;
width:450px;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>Dosya Boyutu Dönüştürücü</h1>

<input type="number" id="deger" placeholder="Değer">

<select id="birim">
<option value="MB">MB</option>
<option value="GB">GB</option>
<option value="TB">TB</option>
</select>

<button onclick="hesapla()">Dönüştür</button>

<div id="sonuc" class="result"></div>

</div>

<script>

function hesapla(){

let deger=parseFloat(document.getElementById("deger").value);
let birim=document.getElementById("birim").value;

if(!deger){
alert("Değer giriniz");
return;
}

let sonuc="";

if(birim==="MB"){
sonuc=
(deger/1024).toFixed(2)+" GB<br>"+
(deger/1024/1024).toFixed(4)+" TB";
}

if(birim==="GB"){
sonuc=
(deger*1024).toFixed(2)+" MB<br>"+
(deger/1024).toFixed(4)+" TB";
}

if(birim==="TB"){
sonuc=
(deger*1024).toFixed(2)+" GB<br>"+
(deger*1024*1024).toFixed(2)+" MB";
}

document.getElementById("sonuc").innerHTML=sonuc;

}

</script>

</body>
</html>
