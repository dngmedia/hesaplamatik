<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mevduat Faizi Hesaplama - Hesapmatik</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#07142c;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:#102348;
padding:30px;
border-radius:20px;
width:90%;
max-width:500px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-bottom:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
background:#8b5cf6;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.result{
margin-top:20px;
padding:15px;
background:#1b3568;
border-radius:10px;
}

.back{
display:block;
text-align:center;
margin-top:20px;
color:#9ec5ff;
text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

<h1>Mevduat Faizi Hesaplama</h1>

<input type="number" id="anaPara" placeholder="Ana Para (TL)">
<input type="number" id="faiz" placeholder="Yıllık Faiz (%)">
<input type="number" id="gun" placeholder="Gün Sayısı">

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result" style="display:none;"></div>

<a href="index.html" class="back">← Ana Sayfaya Dön</a>

</div>

<script>

function hesapla(){

let anaPara=parseFloat(document.getElementById("anaPara").value);
let faiz=parseFloat(document.getElementById("faiz").value);
let gun=parseFloat(document.getElementById("gun").value);

let kazanc=(anaPara*faiz*gun)/(365*100);

document.getElementById("sonuc").style.display="block";

document.getElementById("sonuc").innerHTML=
"Faiz Kazancı: <strong>"+kazanc.toFixed(2)+" TL</strong><br><br>Toplam Tutar: <strong>"+(anaPara+kazanc).toFixed(2)+" TL</strong>";

}

</script>

</body>
</html>
