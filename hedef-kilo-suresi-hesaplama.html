<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hedef Kilo Süresi Hesaplama</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#1f2937;
padding:25px;
border-radius:12px;
width:420px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>Hedef Kilo Süresi Hesaplama</h1>

<input type="number" id="mevcut" placeholder="Mevcut Kilo (kg)">

<input type="number" id="hedef" placeholder="Hedef Kilo (kg)">

<input type="number" id="haftalik" placeholder="Haftalık Kilo Kaybı (kg)">

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result"></div>

</div>

<script>

function hesapla(){

let mevcut=parseFloat(document.getElementById("mevcut").value);
let hedef=parseFloat(document.getElementById("hedef").value);
let haftalik=parseFloat(document.getElementById("haftalik").value);

if(!mevcut || !hedef || !haftalik){
alert("Tüm alanları doldurun");
return;
}

let sure=(mevcut-hedef)/haftalik;

document.getElementById("sonuc").innerHTML=
"Hedefe Ulaşma Süresi: "+
Math.ceil(sure)+
" hafta";

}

</script>

</body>
</html>
