<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yakıt Maliyeti Hesaplama - Hesapmatik</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#07142c;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:#102348;
padding:30px;
border-radius:20px;
width:90%;
max-width:500px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-bottom:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
background:#8b5cf6;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.result{
margin-top:20px;
padding:15px;
background:#1b3568;
border-radius:10px;
}

.back{
display:block;
text-align:center;
margin-top:20px;
color:#9ec5ff;
text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

<h1>Yakıt Maliyeti Hesaplama</h1>

<input type="number" id="mesafe" placeholder="Mesafe (KM)">
<input type="number" id="tuketim" placeholder="100 KM Tüketim (Litre)">
<input type="number" id="fiyat" placeholder="Yakıt Fiyatı (TL)">

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result" style="display:none;"></div>

<a href="index.html" class="back">← Ana Sayfaya Dön</a>

</div>

<script>

function hesapla(){

let mesafe=parseFloat(document.getElementById("mesafe").value);
let tuketim=parseFloat(document.getElementById("tuketim").value);
let fiyat=parseFloat(document.getElementById("fiyat").value);

let litre=(mesafe*tuketim)/100;
let maliyet=litre*fiyat;

document.getElementById("sonuc").style.display="block";

document.getElementById("sonuc").innerHTML=
"Gerekli Yakıt: <strong>"+litre.toFixed(2)+" Litre</strong><br><br>Toplam Maliyet: <strong>"+maliyet.toFixed(2)+" TL</strong>";

}

</script>

</body>
</html>
