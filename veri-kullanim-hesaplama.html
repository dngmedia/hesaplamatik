<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veri Kullanım Hesaplama</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#1f2937;
padding:25px;
border-radius:12px;
width:450px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>Veri Kullanım Hesaplama</h1>

<input type="number" id="gb" placeholder="Günlük Kullanım (GB)">

<input type="number" id="gun" placeholder="Gün Sayısı">

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result"></div>

</div>

<script>

function hesapla(){

let gb=parseFloat(document.getElementById("gb").value);
let gun=parseFloat(document.getElementById("gun").value);

if(!gb || !gun){
alert("Tüm alanları doldurun");
return;
}

let toplam=gb*gun;

document.getElementById("sonuc").innerHTML=
"Toplam Veri Kullanımı: "+
toplam.toFixed(2)+
" GB";

}

</script>

</body>
</html>
