<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Başa Baş Noktası Hesaplama</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#1f2937;
padding:25px;
border-radius:12px;
width:450px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>Başa Baş Noktası Hesaplama</h1>

<input type="number" id="sabit" placeholder="Sabit Giderler (₺)">

<input type="number" id="fiyat" placeholder="Birim Satış Fiyatı (₺)">

<input type="number" id="maliyet" placeholder="Birim Maliyet (₺)">

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result"></div>

</div>

<script>

function hesapla(){

let sabit=parseFloat(document.getElementById("sabit").value);
let fiyat=parseFloat(document.getElementById("fiyat").value);
let maliyet=parseFloat(document.getElementById("maliyet").value);

if(!sabit || !fiyat || !maliyet){
alert("Tüm alanları doldurun");
return;
}

if(fiyat <= maliyet){
alert("Satış fiyatı maliyetten büyük olmalıdır.");
return;
}

let adet=sabit/(fiyat-maliyet);

document.getElementById("sonuc").innerHTML=
"Başa Baş Noktası: " +
Math.ceil(adet).toLocaleString("tr-TR") +
" adet satış";

}

</script>

</body>
</html>
