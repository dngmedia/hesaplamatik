<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yakıt Tüketimi Hesaplama - Hesapmatik</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#07142c;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}
.card{
background:#102348;
padding:30px;
border-radius:20px;
width:90%;
max-width:500px;
}
input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-bottom:15px;
box-sizing:border-box;
}
button{
width:100%;
padding:15px;
background:#8b5cf6;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}
.result{
margin-top:20px;
padding:15px;
background:#1b3568;
border-radius:10px;
}
</style>
</head>
<body>

<div class="card">

<h1>Yakıt Tüketimi Hesaplama</h1>

<input type="number" id="km" placeholder="Gidilen Mesafe (KM)">
<input type="number" id="litre" placeholder="Harcanan Yakıt (Litre)">

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result" style="display:none;"></div>

</div>

<script>

function hesapla(){

let km=parseFloat(document.getElementById("km").value);
let litre=parseFloat(document.getElementById("litre").value);

let sonuc=(litre/km)*100;

document.getElementById("sonuc").style.display="block";

document.getElementById("sonuc").innerHTML=
"100 KM'de <strong>"+sonuc.toFixed(2)+" litre</strong> yakıt tüketiyorsunuz.";

}

</script>

</body>
</html>
