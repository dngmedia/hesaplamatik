<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazal Metabolizma Hesaplama</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#1f2937;
padding:25px;
border-radius:12px;
width:420px;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>Bazal Metabolizma Hesaplama</h1>

<select id="cinsiyet">
<option value="erkek">Erkek</option>
<option value="kadin">Kadın</option>
</select>

<input type="number" id="kilo" placeholder="Kilo (kg)">

<input type="number" id="boy" placeholder="Boy (cm)">

<input type="number" id="yas" placeholder="Yaş">

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result"></div>

</div>

<script>

function hesapla(){

let kilo=parseFloat(document.getElementById("kilo").value);
let boy=parseFloat(document.getElementById("boy").value);
let yas=parseFloat(document.getElementById("yas").value);
let cinsiyet=document.getElementById("cinsiyet").value;

if(!kilo || !boy || !yas){
alert("Tüm alanları doldurun");
return;
}

let bmh;

if(cinsiyet==="erkek"){
bmh=(10*kilo)+(6.25*boy)-(5*yas)+5;
}else{
bmh=(10*kilo)+(6.25*boy)-(5*yas)-161;
}

document.getElementById("sonuc").innerHTML=
"Günlük Bazal Metabolizma: " +
Math.round(bmh) +
" kcal";

}

</script>

</body>
</html>
