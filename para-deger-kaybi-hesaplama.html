<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Değer Kaybı Hesaplama</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:#1f2937;
padding:25px;
border-radius:12px;
width:450px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>Para Değer Kaybı Hesaplama</h1>

<input type="number" id="para" placeholder="Başlangıç Tutarı (₺)">

<input type="number" id="enflasyon" placeholder="Yıllık Enflasyon (%)">

<input type="number" id="yil" placeholder="Yıl">

<button onclick="hesapla()">Hesapla</button>

<div id="sonuc" class="result"></div>

</div>

<script>

function hesapla(){

let para=parseFloat(document.getElementById("para").value);
let enflasyon=parseFloat(document.getElementById("enflasyon").value);
let yil=parseFloat(document.getElementById("yil").value);

if(!para || !enflasyon || !yil){
alert("Tüm alanları doldurun");
return;
}

let bugunkuDeger =
para / Math.pow((1 + enflasyon/100), yil);

document.getElementById("sonuc").innerHTML =
"Paranın Bugünkü Değeri: " +
bugunkuDeger.toLocaleString("tr-TR",{maximumFractionDigits:2}) +
" ₺";

}

</script>

</body>
</html>
